name: SecureLab Security Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  secrets-scan:
    name: Scan des secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks — détection de secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast:
    name: Analyse statique du code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep — SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/docker

  image-scan:
    name: Scan de vulnérabilités Docker
    runs-on: ubuntu-latest
    needs: [secrets-scan, sast]
    steps:
      - uses: actions/checkout@v4

      - name: Build de l'image
        run: |
              ls -la
              ls -la app/
              docker build -t securelab:${{ github.sha }} ./app

      - name: Trivy — scan CVE
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: securelab:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
